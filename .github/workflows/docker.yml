permissions:
  contents: write
  packages: write

name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build backend JAR
      - name: Build backend JAR
        working-directory: backend
        run: ./mvnw clean package

      # 4. Build Docker image (from backend folder)
      - name: Build Docker image
        working-directory: backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }} .

      # 5. Scan image
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      # 6. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }}

      # 8. Update K8s deployment (FIXED PATH)
      - name: Update backend deployment image
        run: |
          sed -i "s|ronn4/projectmanager:.*|ronn4/projectmanager:${{ github.sha }}|g" k8s/backend-deployment.yaml

      # 9. Commit & push change
      - name: Commit and push updated YAML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/backend-deployment.yaml
          git diff --cached --quiet || git commit -m "update backend image to ${{ github.sha }}"
          git push origin HEAD:main --force

  frontend:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build frontend image
      - name: Build frontend image
        working-directory: frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${{ github.sha }} .

      # Push frontend image
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${{ github.sha }}

      # Update frontend deployment YAML
      - name: Update frontend deployment image
        run: |
          sed -i "s|ronn4/projectmanager-frontend:.*|ronn4/projectmanager-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      # Commit & push
      - name: Commit and push updated YAML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/frontend-deployment.yaml
          git diff --cached --quiet || git commit -m "update frontend image to ${{ github.sha }}"
          git push origin HEAD:main --force