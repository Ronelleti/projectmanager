permissions:
  contents: write
  packages: write

name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # CHECKOUT
      # -----------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------
      # SET TAG
      # -----------------------
      - name: Set tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # -----------------------
      # SET ENV (dev / prod)
      # -----------------------
      - name: Set environment
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "VALUES_FILE=projectmanager/values-prod.yaml" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "VALUES_FILE=projectmanager/values-dev.yaml" >> $GITHUB_ENV
          fi

      # -----------------------
      # BACKEND BUILD
      # -----------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend JAR
        working-directory: backend
        run: ./mvnw clean package

      # -----------------------
      # DOCKER LOGIN
      # -----------------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -----------------------
      # BUILD & PUSH BACKEND
      # -----------------------
      - name: Build backend image
        working-directory: backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager:${TAG} .

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager:${TAG}

      # -----------------------
      # BUILD & PUSH FRONTEND
      # -----------------------
      - name: Build frontend image
        working-directory: frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${TAG} .

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${TAG}

      # -----------------------
      # UPDATE HELM VALUES (ENV BASED)
      # -----------------------
      - name: Update Helm values with new image tag
        run: |
          echo "Updating $VALUES_FILE for $ENV environment"

          # Update backend image tag
          sed -i "s|\(repository: .*/projectmanager\).*|\1\n    tag: ${TAG}|" $VALUES_FILE

          # Update frontend image tag
          sed -i "s|\(repository: .*/projectmanager-frontend\).*|\1\n    tag: ${TAG}|" $VALUES_FILE

      # -----------------------
      # COMMIT BACK TO GIT
      # -----------------------
      - name: Commit and push updated values file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add $VALUES_FILE
          git diff --cached --quiet || git commit -m "update ${ENV} image tag to ${TAG}"
          git push