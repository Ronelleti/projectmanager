permissions:
  contents: write
  packages: write

name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # CHECKOUT
      # -----------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------
      # SET TAG
      # -----------------------
      - name: Set tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # -----------------------
      # BACKEND BUILD
      # -----------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend JAR
        working-directory: backend
        run: ./mvnw clean package

      # -----------------------
      # DOCKER LOGIN
      # -----------------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -----------------------
      # BUILD & PUSH BACKEND
      # -----------------------
      - name: Build backend image
        working-directory: backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager:${TAG} .

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager:${TAG}

      # -----------------------
      # BUILD & PUSH FRONTEND
      # -----------------------
      - name: Build frontend image
        working-directory: frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${TAG} .

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager-frontend:${TAG}

      # -----------------------
      # UPDATE HELM VALUES (🔥 IMPORTANT)
      # -----------------------
      - name: Update values.yaml with new image tag
        run: |
          sed -i "s|tag: .*|tag: ${TAG}|g" projectmanager/values.yaml

      # -----------------------
      # COMMIT BACK TO GIT
      # -----------------------
      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add projectmanager/values.yaml
          git diff --cached --quiet || git commit -m "update image tag to ${TAG}"
          git push