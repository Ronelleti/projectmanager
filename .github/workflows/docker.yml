permissions:
  contents: write

name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }} .

      # 🔐 NOW scan AFTER build
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }}

      - name: Update backend-deployment.yaml image
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/projectmanager:${{ github.sha }}|g" argocd/deployment.yaml

      - name: Commit and push updated YAML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add argocd/deployment.yaml
          git diff --cached --quiet || git commit -m "update image to ${{ github.sha }}"
          git push