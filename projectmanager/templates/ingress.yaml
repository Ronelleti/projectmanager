apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: frontend

spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.frontend }}
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.service.frontend.port }}

          - path: {{ .Values.ingress.paths.backend }}
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.service.backend.port }}