apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: frontend
spec:
  schedule: "*/5 * * * *"

  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      backoffLimit: 2

      template:
        spec:
          containers:
            - name: backup
              image: postgres:15

              env:
                - name: POSTGRES_USER   # ✅ ADD THIS
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER

                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD

              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /backup

                  echo "Starting backup..."

                  pg_dump -h postgres -U $POSTGRES_USER projectmanager \
                  > /backup/backup-$(date +%Y%m%d%H%M).sql

                  echo "Backup completed"

                  find /backup -type f -mtime +1 -delete

              volumeMounts:
                - name: backup-storage
                  mountPath: /backup

          restartPolicy: OnFailure

          volumes:
            - name: backup-storage
              emptyDir: {}