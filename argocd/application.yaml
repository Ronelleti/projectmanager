apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projectmanager
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend   # 🔥 FIXED
  source:
    repoURL: https://github.com/Ronelleti/projectmanager.git   # 🔥 FIXED
    targetRevision: HEAD
    path: k8s
  syncPolicy:
    automated:
      prune: true
      selfHeal: true