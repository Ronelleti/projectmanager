apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: frontend   # 🔥 MUST MATCH YOUR WORKING SETUP
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ronn4/projectmanager:latest   # 🔥 CI/CD will update this
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: frontend   # 🔥 MUST MATCH
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080