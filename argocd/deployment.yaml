apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projectmanager
  template:
    metadata:
      labels:
        app: projectmanager
    spec:
      containers:
        - name: projectmanager
          image: ronn4/projectmanager:2530704af21361d6fac599e16561897cd76a3bc3
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: projectmanager
spec:
  type: NodePort
  selector:
    app: projectmanager
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007