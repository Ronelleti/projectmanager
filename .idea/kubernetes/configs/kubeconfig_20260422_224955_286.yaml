apiVersion: v1
kind: Config

clusters:
  - name: minikube
    cluster:
      server: https://127.0.0.1:49183
      certificate-authority: /Users/ron/.minikube/ca.crt

users:
  - name: minikube
    user:
      client-certificate: /Users/ron/.minikube/profiles/minikube/client.crt
      client-key: /Users/ron/.minikube/profiles/minikube/client.key

contexts:
  - name: minikube
    context:
      cluster: minikube
      user: minikube

current-context: minikube