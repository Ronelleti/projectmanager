apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ronn4/projectmanager-frontend:c830a47d2baf8f2bdc39c56a3eec44c961f9fb3d
          imagePullPolicy: Always
          ports:
            - containerPort: 80