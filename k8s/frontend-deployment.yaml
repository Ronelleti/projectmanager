apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ronn4/projectmanager-frontend:27c8ff393d3e5c748d2c4767cdbcfcae5cdfb755
          imagePullPolicy: Always
          ports:
            - containerPort: 80