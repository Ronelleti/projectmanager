apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projectmanager
  template:
    metadata:
      labels:
        app: projectmanager
    spec:
      containers:
        - name: projectmanager
          image: <your-docker-username>/projectmanager:latest
          ports:
            - containerPort: 8080
